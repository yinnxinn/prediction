# 极简兼容：无 healthcheck（适用于 docker-compose 极旧、不支持 healthcheck 时）
# 用法：cp deploy/docker-compose.no-healthcheck.yml docker-compose.yml
version: "2.1"

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    image: pridection-price:latest
    container_name: pridection-price-app
    expose:
      - "8001"
    env_file:
      - .env
    environment:
      TZ: Asia/Shanghai
    volumes:
      - ./data:/app/data
      - ./models:/app/models
      - ./docs:/app/docs:ro
    restart: always

  gateway:
    image: nginx:alpine
    container_name: pridection-price-nginx
    ports:
      - "80:80"
    volumes:
      - ./deploy/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - app
    restart: always
