# 生产：Nginx 监听 80 → 反向代理 app:8001
# 需 Docker Compose 1.27+（或 docker compose v2）；显式 version 以兼容旧版 docker-compose
version: "3.8"

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    image: pridection-price:latest
    container_name: pridection-price-app
    expose:
      - "8001"
    env_file:
      - .env
    environment:
      TZ: Asia/Shanghai
    volumes:
      - ./data:/app/data
      - ./models:/app/models
      - ./docs:/app/docs:ro
    restart: unless-stopped
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8001/health', timeout=3).read()",
        ]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 25s

  # 服务名避免用 nginx：极少数旧版 compose 会误解析
  gateway:
    image: nginx:alpine
    container_name: pridection-price-nginx
    ports:
      - "80:80"
    volumes:
      - ./deploy/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - app
    restart: unless-stopped
