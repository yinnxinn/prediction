# 生产：Nginx 监听 80 → 反向代理 app:8001
#
# Compose file format 2.1：兼容旧版 docker-compose 1.x（含 Python 2.7 环境）。
# 新环境请使用 Docker 20+ 自带的 `docker compose`（V2 插件）。
version: "2.1"

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        # 国内网络访问 PyPI 易超时，构建时用清华镜像；海外可改为 https://pypi.org/simple
        PIP_INDEX_URL: https://pypi.tuna.tsinghua.edu.cn/simple
    image: pridection-price:latest
    container_name: pridection-price-app
    expose:
      - "8001"
    env_file:
      - .env
    environment:
      TZ: Asia/Shanghai
    volumes:
      - ./data:/app/data
      - ./models:/app/models
      - ./docs:/app/docs:ro
    restart: unless-stopped
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8001/health', timeout=3).read()",
        ]
      interval: 30s
      timeout: 5s
      retries: 3

  gateway:
    image: nginx:alpine
    container_name: pridection-price-nginx
    ports:
      - "80:80"
    volumes:
      - ./deploy/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - app
    restart: unless-stopped
