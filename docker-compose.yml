# 一键部署：构建镜像并启动（前后端同端口 8001，见 deploy.ps1 / deploy.sh）
services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    image: pridection-price:latest
    container_name: pridection-price
    ports:
      - "8001:8001"
    # 若不存在 .env，运行 deploy.ps1 / deploy.sh 会从 .env.example 复制
    env_file:
      - .env
    environment:
      # 覆盖默认 PDF 路径时可用（容器内路径）
      # PDF_PATH: /app/docs/2025年1-12月电费核查联.pdf
      TZ: Asia/Shanghai
    volumes:
      # 持久化数据与模型；本地目录挂载到容器
      - ./data:/app/data
      - ./models:/app/models
      - ./docs:/app/docs:ro
    restart: unless-stopped
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8001/health', timeout=3).read()",
        ]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s
