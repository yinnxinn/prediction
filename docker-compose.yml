# 生产：Nginx 监听 80 → 反向代理 app:8001（应用不直接暴露宿主机端口）
services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    image: pridection-price:latest
    container_name: pridection-price-app
    # 不映射到宿主机；仅内网供 nginx 访问
    expose:
      - "8001"
    env_file:
      - .env
    environment:
      TZ: Asia/Shanghai
    volumes:
      - ./data:/app/data
      - ./models:/app/models
      - ./docs:/app/docs:ro
    restart: unless-stopped
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8001/health', timeout=3).read()",
        ]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 25s

  nginx:
    image: nginx:alpine
    container_name: pridection-price-nginx
    ports:
      - "80:80"
    volumes:
      - ./deploy/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      app:
        condition: service_healthy
    restart: unless-stopped
